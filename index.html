<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>راتبك الحقيقي</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-901R80XCW0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-901R80XCW0');
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 40px 20px;
}

h1 { font-size: 30px; }

.sub { color: #94a3b8; margin-top: 10px; }

button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
}

.primary { background: #22c55e; color: white; }
.danger { background: #ef4444; color: white; }

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 16px;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

.result {
    display: none;
    margin-top: 20px;
    font-size: 24px;
}
</style>
</head>

<body>

<div class="container">

<h1>هذا مو راتبك الحقيقي 😳</h1>
<p class="sub">راتبك الحقيقي هو اللي يبقى بعد المصاريف</p>

<button class="primary" onclick="track('click_button'); scrollToCalc()">
احسب كم يتبقى من راتبك الآن 😳
</button>

<p class="sub">😳 غالبية الناس ما يتوقعون النتيجة</p>

<div class="card" id="calc">

<input type="number" id="salary" placeholder="راتبك الشهري">
<input type="number" id="expenses" placeholder="مصاريفك الشهرية">

<button class="danger" onclick="calculate()">
احسب النتيجة الآن ⚠️
</button>

<div class="result" id="result"></div>

<button class="primary" id="cta" style="display:none;" onclick="goToOffer()">
ابدأ التحكم في فلوسك الآن 🔥
</button>

</div>
</div>

<script>

// 🔥 تتبع احترافي
function track(eventName, extra = {}) {
    console.log("Tracking:", eventName, extra);

    if (typeof gtag === "function") {
        gtag('event', eventName, {
            event_category: 'engagement',
            ...extra
        });
    }
}

// 👇 تتبع الكتابة (مرة واحدة فقط)
let salaryTracked = false;
let expensesTracked = false;

document.getElementById("salary").addEventListener("input", function() {
    if (!salaryTracked && this.value.length > 0) {
        track('salary_entered');
        salaryTracked = true;
    }
});

document.getElementById("expenses").addEventListener("input", function() {
    if (!expensesTracked && this.value.length > 0) {
        track('expenses_entered');
        expensesTracked = true;
    }
});

// النزول
function scrollToCalc() {
    track('scroll_to_calculator');
    document.getElementById("calc").scrollIntoView({behavior: "smooth"});
}

// الحساب
function calculate() {

    track('calculate_clicked');

    let salary = parseFloat(document.getElementById("salary").value);
    let expenses = parseFloat(document.getElementById("expenses").value);

    if (!salary || !expenses) {
        track('input_error');
        alert("أدخل البيانات");
        return;
    }

    let result = salary - expenses;

    let resultDiv = document.getElementById("result");
    let cta = document.getElementById("cta");

    resultDiv.style.display = "block";
    resultDiv.innerHTML = "😳 راتبك الحقيقي هو: " + result + " ريال";

    // 🔥 تتبع ظهور النتيجة
    track('result_shown', {
        value: result
    });

    cta.style.display = "block";
}

// التحويل
function goToOffer() {
    track('go_to_free_product');
    window.location.href = "https://technologyt795-dotcom.github.io/mizaniyati-free/";
}

</script>
</body>
</html>
