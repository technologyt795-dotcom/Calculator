<style>
body{font-family:Arial;background:#0f172a;color:#fff;text-align:center}
.container{max-width:420px;margin:auto;padding:30px 20px}
input{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:12px;cursor:pointer}
.primary{background:#22c55e;color:#fff}
.danger{background:#ef4444;color:#fff}
.card{background:#1e293b;padding:20px;border-radius:16px;margin-top:20px}
.result{display:none;margin-top:15px}
.dashboard{margin-top:25px;background:#0b1220;padding:15px;border-radius:12px;text-align:right}
.small{font-size:12px;color:#94a3b8}
</style>
</head>

<body>

<div class="container">

<h2>راتبك الحقيقي PRO 😳</h2>

<input type="number" id="salary" placeholder="راتبك الشهري">
<input type="number" id="expenses" placeholder="مصاريفك الشهرية">

<button class="danger" onclick="calculate()">احسب النتيجة</button>

<div class="card">
    <div class="result" id="result"></div>
    <button class="primary" id="cta" style="display:none" onclick="goToOffer()">
    اكتشف أكثر 🔥
    </button>
</div>

<!-- 📊 Dashboard -->
<div class="dashboard">
<h3>📊 Dashboard Live</h3>
<div id="log"></div>
</div>

</div>

<script>

/// 🆔 User ID
let userId = localStorage.getItem("uid");

if(!userId){
    userId = "user_" + Math.floor(Math.random()*99999999);
    localStorage.setItem("uid", userId);
}

/// 📦 Events storage
let events = JSON.parse(localStorage.getItem("events") || "[]");

function saveEvent(e){
    events.push(e);
    localStorage.setItem("events", JSON.stringify(events));
    renderDashboard();
}

/// 🔥 Tracking (FIXED PRO VERSION)
function track(eventName, data={}){

    let value = data.net || data.salary || data.expenses || 0;

    let payload = {
        user_id: userId,
        value: value
    };

    console.log(eventName, payload);

    // GA4 (clean)
    if(typeof gtag === "function"){
        gtag('event', eventName, payload);
    }

    // Meta (simple values only)
    if(window.fbq){
        fbq('trackCustom', eventName, payload);
    }

    // TikTok (simple values only)
    if(window.ttq){
        ttq.track(eventName, payload);
    }

    saveEvent({
        event: eventName,
        ...payload,
        time: new Date().toISOString()
    });
}

/// Page view funnel
track("page_view",{step:"landing"});

let s=false,e=false;

document.getElementById("salary").addEventListener("input", function(){
    if(!s){
        track("salary_entered",{salary:Number(this.value)});
        s=true;
    }
});

document.getElementById("expenses").addEventListener("input", function(){
    if(!e){
        track("expenses_entered",{expenses:Number(this.value)});
        e=true;
    }
});

function calculate(){

    let salary = Number(document.getElementById("salary").value);
    let expenses = Number(document.getElementById("expenses").value);

    if(!salary || !expenses){
        track("input_error");
        return;
    }

    let result = salary - expenses;

    track("calculate_clicked",{salary,expenses});

    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML =
    `😳 صافي راتبك: ${result} ريال`;

    track("result_shown",{salary,expenses,net:result});

    document.getElementById("cta").style.display="block";
}

function goToOffer(){
    track("conversion_click");
    window.location.href="https://technologyt795-dotcom.github.io/mizaniyati-free/";
}

/// Dashboard
function renderDashboard(){

    let html = "";

    events.slice(-10).reverse().forEach(e=>{
        html += `
        <div class="small">
        ${e.time} | ${e.event} | value: ${e.value || 0}
        </div>`;
    });

    document.getElementById("log").innerHTML = html;
}

renderDashboard();

</script>

</body>
</html>
