<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>راتبك الحقيقي</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 40px 20px;
}

h1 { font-size: 30px; margin-bottom: 10px; }

.sub { color: #94a3b8; margin-bottom: 10px; }

button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
}

.primary { background: #22c55e; color: white; }
.danger { background: #ef4444; color: white; }

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 16px;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

.result {
    display: none;
    margin-top: 20px;
    font-size: 24px;
}

#cta { display: none; }

footer {
    color: #475569;
    margin-top: 30px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

    <h1>هذا مو راتبك الحقيقي 😳</h1>
    <p class="sub">راتبك الحقيقي هو اللي يبقى بعد المصاريف</p>

    <button class="primary" onclick="track('click_button'); scrollToCalc()">
        احسب كم يتبقى من راتبك الآن 😳
    </button>

    <p class="sub">😳 غالبية الناس ما يتوقعون النتيجة</p>

    <div class="card" id="calc">
        <input type="number" id="salary" placeholder="راتبك الشهري">
        <input type="number" id="expenses" placeholder="مصاريفك الشهرية">

        <button class="danger" onclick="calculate()">
            احسب النتيجة الآن ⚠️
        </button>

        <div class="result" id="result"></div>

        <button class="primary" id="cta" onclick="goToOffer()">
            ابدأ التحكم في فلوسك الآن 🔥
        </button>
    </div>

    <!-- 🔥 الإحصائيات -->
    <div id="stats" style="margin-top:20px; color:#94a3b8;"></div>

    <footer>© 2024 راتبك الحقيقي</footer>

</div>

<script>

// 🔥 التتبع
function track(eventName) {
    fetch("https://api.countapi.xyz/hit/salary-app/" + eventName)
    .then(res => res.json())
    .then(data => {
        console.log(eventName + ":", data.value);
        loadStats(); // تحديث الأرقام بعد كل حدث
    })
    .catch(err => console.log(err));
}

// النزول للحاسبة
function scrollToCalc() {
    document.getElementById("calc").scrollIntoView({behavior: "smooth"});
}

// الحساب
function calculate() {
    track("calculate");

    let salary = document.getElementById("salary").value;
    let expenses = document.getElementById("expenses").value;

    if (!salary || !expenses) {
        alert("أدخل البيانات");
        return;
    }

    let result = salary - expenses;

    let resultDiv = document.getElementById("result");
    let cta = document.getElementById("cta");

    resultDiv.style.display = "block";
    resultDiv.innerHTML = "😳 راتبك الحقيقي: " + result + " ريال";

    cta.style.display = "block";
}

// التحويل
function goToOffer() {
    track("purchase_click");
    window.location.href = "PUT_YOUR_LINK_HERE";
}

// 🔥 تحميل الإحصائيات
function loadStats() {
    Promise.all([
        fetch("https://api.countapi.xyz/get/salary-app/click_button").then(r => r.json()),
        fetch("https://api.countapi.xyz/get/salary-app/calculate").then(r => r.json()),
        fetch("https://api.countapi.xyz/get/salary-app/purchase_click").then(r => r.json())
    ])
    .then(([clicks, calculates, purchases]) => {
        document.getElementById("stats").innerHTML =
            "👆 ضغط: " + (clicks.value || 0) +
            " | 🧮 حسب: " + (calculates.value || 0) +
            " | 💰 شراء: " + (purchases.value || 0);
    });
}

// تشغيل تلقائي
loadStats();
setInterval(loadStats, 5000);

</script>

</body>
</html>
