<style>
body{font-family:Arial;background:#0f172a;color:#fff;text-align:center}
.container{max-width:420px;margin:auto;padding:30px 20px}

h2{font-size:26px;margin-bottom:10px}
.sub{color:#94a3b8;font-size:14px;margin-bottom:20px}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px
}

.primary{background:#22c55e;color:#fff}
.danger{background:#ef4444;color:#fff}

.card{
background:#1e293b;
padding:20px;
border-radius:16px;
margin-top:20px
}

.result{
display:none;
margin-top:15px;
font-size:18px;
line-height:1.8
}
</style>

<body>

<div class="container">

<h2>راتبك الحقيقي 😳</h2>
<p class="sub">اكتشف كم يبقى من راتبك بعد المصاريف</p>

<input type="number" id="salary" placeholder="راتبك الشهري">
<input type="number" id="expenses" placeholder="مصاريفك الشهرية">

<button class="danger" onclick="calculate()">
احسب الآن
</button>

<div class="card">

<div class="result" id="result"></div>

<button class="primary" id="cta" style="display:none" onclick="goToOffer()">
اكتشف إدارة أموالك 🔥
</button>

</div>

</div>

<script>

/// 🔥 Tracking system
function track(event, data = {}) {

    // GA4
    if (typeof gtag === "function") {
        gtag('event', event, data);
    }

    // Meta
    if (window.fbq) {
        fbq('trackCustom', event, {
            value: data.net || data.salary || data.expenses || 0
        });
    }

    // TikTok
    if (window.ttq) {
        ttq.track(event, {
            value: data.net || data.salary || data.expenses || 0
        });
    }

    console.log(event, data);
}

/// 📊 بداية التتبع
track("page_view");

let salaryTracked = false;
let expensesTracked = false;

/// إدخال الراتب
document.getElementById("salary").addEventListener("input", function(){
    if(!salaryTracked && this.value){
        track("salary_entered",{salary:Number(this.value)});
        salaryTracked = true;
    }
});

/// إدخال المصاريف
document.getElementById("expenses").addEventListener("input", function(){
    if(!expensesTracked && this.value){
        track("expenses_entered",{expenses:Number(this.value)});
        expensesTracked = true;
    }
});

/// الحساب
function calculate(){

    let salary = Number(document.getElementById("salary").value);
    let expenses = Number(document.getElementById("expenses").value);

    if(!salary || !expenses){
        track("input_error");
        return;
    }

    let result = salary - expenses;

    track("calculate_clicked",{salary,expenses});

    document.getElementById("result").style.display = "block";

    document.getElementById("result").innerHTML =
    `😳 صافي راتبك الحقيقي: <b>${result} ريال</b><br><br>
    اكتشف كيف تتحكم بفلوسك بشكل أفضل 👇`;

    track("result_shown",{
        salary,
        expenses,
        net: result
    });

    document.getElementById("cta").style.display = "block";
}

/// التحويل
function goToOffer(){
    track("conversion_click");
    window.location.href =
    "https://technologyt795-dotcom.github.io/mizaniyati-free/";
}

</script>

</body>
</html>
