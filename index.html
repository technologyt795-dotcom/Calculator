<style>
body { font-family: Arial; background:#0f172a; color:#fff; text-align:center; }
.container { max-width:420px; margin:auto; padding:40px 20px; }
button { width:100%; padding:15px; margin-top:10px; border:none; border-radius:12px; cursor:pointer; }
.primary{background:#22c55e;color:#fff}
.danger{background:#ef4444;color:#fff}
input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
.card{background:#1e293b;padding:20px;border-radius:16px;margin-top:20px}
.result{display:none;margin-top:20px;font-size:20px}
</style>

<body>

<div class="container">

<h1>هذا مو راتبك الحقيقي 😳</h1>

<button class="primary" onclick="track('click_start'); scrollToCalc()">
ابدأ الحساب الآن
</button>

<div class="card" id="calc">

<input type="number" id="salary" placeholder="راتبك">
<input type="number" id="expenses" placeholder="مصاريفك">

<button class="danger" onclick="calculate()">احسب</button>

<div class="result" id="result"></div>

<button class="primary" id="cta" style="display:none" onclick="goToOffer()">
اكتشف أكثر 🔥
</button>

</div>
</div>

<script>

/// 🆔 User ID (مهم جداً)
let userId = localStorage.getItem("uid");

if(!userId){
    userId = "user_" + Math.floor(Math.random()*100000000);
    localStorage.setItem("uid", userId);
}

/// 📊 Tracking موحد
function track(event, params={}) {

    let data = {
        user_id: userId,
        ...params
    };

    console.log(event, data);

    // GA4
    gtag('event', event, data);

    // Meta Pixel
    if(window.fbq){
        fbq('trackCustom', event, data);
    }

    // TikTok
    if(window.ttq){
        ttq.track(event, data);
    }
}


/// Funnel Step 1
track("page_view", {step:"landing"});

let s=false,e=false;

document.getElementById("salary").addEventListener("input", function(){
    if(!s){
        track("salary_entered",{salary:Number(this.value)});
        s=true;
    }
});

document.getElementById("expenses").addEventListener("input", function(){
    if(!e){
        track("expenses_entered",{expenses:Number(this.value)});
        e=true;
    }
});

function scrollToCalc(){
    track("scroll_interest",{step:"interest"});
    document.getElementById("calc").scrollIntoView({behavior:"smooth"});
}

function calculate(){

    let salary = Number(document.getElementById("salary").value);
    let expenses = Number(document.getElementById("expenses").value);

    if(!salary || !expenses){
        track("error_input");
        return;
    }

    let result = salary - expenses;

    /// Funnel Step 3
    track("calculate",{salary,expenses,step:"intent"});

    document.getElementById("result").style.display="block";

    document.getElementById("result").innerHTML = 
    `راتبك الحقيقي: ${result} ريال`;

    /// Funnel Step 4 (Conversion step inside page)
    track("result_shown",{
        salary,
        expenses,
        net: result,
        step:"conversion_intent"
    });

    document.getElementById("cta").style.display="block";
}

function goToOffer(){
    track("conversion_click");

    /// 🔥 تحويل فعلي
    window.location.href = "https://technologyt795-dotcom.github.io/mizaniyati-free/";
}

</script>

</body>
</html>
